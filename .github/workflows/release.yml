# File release.yml
name: Release Pipeline

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # 🧠 VERSIONING DA GIT TAG (SENZA TOOL ESTERNI)
      - name: Compute version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest=$LATEST_TAG" >> $GITHUB_OUTPUT

          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          NEW_VERSION="$MAJOR.$((MINOR+1)).0"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      # 🌿 CREA RELEASE BRANCH
      - name: Create release branch
        run: |
          git checkout -b release/${{ steps.version.outputs.version }}
          git push origin release/${{ steps.version.outputs.version }}

      # 📝 BUILD + VALIDAZIONE RELEASE
      - name: Build release
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore
          dotnet test --configuration Release --no-build

      # 📦 (OPZIONALE) PACK NUGET
      - name: Pack (if needed)
        run: |
          dotnet pack --configuration Release --no-build --output ./artifacts

      # 🔀 PR AUTOMATICA VERSO MAIN
      - name: Create PR to main
        uses: repo-sync/pull-request@v2
        with:
          source_branch: release/${{ steps.version.outputs.version }}
          destination_branch: main
          pr_title: "Release ${{ steps.version.outputs.version }}"
          pr_body: |
            🚀 Automatic Release

            Version: ${{ steps.version.outputs.version }}

            ✔ Build passed  
            ✔ Tests passed  
            ✔ Ready for production review

      # 🌐 PREVIEW TAG (OPTIONALE)
      - name: Tag preview
        run: |
          echo "Preview ready for release/${{ steps.version.outputs.version }}"