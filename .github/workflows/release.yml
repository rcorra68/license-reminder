# File release.yml
name: Release Pipeline

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release:
    name: Create Release Candidate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Determine next version
        id: version
        run: |
          npx semantic-release --dry-run > release.txt || true
          VERSION=$(npx semantic-release --dry-run | grep -oP 'next release version: \K.*' || echo "0.0.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release branch
        run: |
          git checkout -b release/${{ steps.version.outputs.version }}
          git push origin release/${{ steps.version.outputs.version }}

      - name: Generate changelog
        run: npm run changelog || true

      - name: Create Pull Request to main
        uses: repo-sync/pull-request@v2
        with:
          destination_branch: main
          source_branch: release/${{ steps.version.outputs.version }}
          pr_title: "Release ${{ steps.version.outputs.version }}"
          pr_body: |
            🚀 Automatic Release Candidate

            - Version: ${{ steps.version.outputs.version }}
            - Generated from develop
            - Includes all merged features

      - name: Deploy preview
        run: |
          echo "Deploying preview for release/${{ steps.version.outputs.version }}"
          npm run deploy:preview
        env:
          ENVIRONMENT: preview